name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Install Docker Compose
        run: |
          DOCKER_COMPOSE_VERSION=v2.24.0
          sudo curl -SL https://github.com/docker/compose/releases/download/${DOCKER_COMPOSE_VERSION}/docker-compose-linux-x86_64 \
            -o /usr/local/bin/docker-compose
          sudo chmod +x /usr/local/bin/docker-compose
          docker-compose version

      - name: Build and start Docker Compose services
        run: docker-compose up --build -d
        env:
          MYSQL_ROOT_PASSWORD: ${{ secrets.MYSQL_ROOT_PASSWORD }}
          MYSQL_DATABASE: ${{ secrets.MYSQL_DATABASE }}

      # - name: Run tests (to be implemented)
      #   run: npm test

      - name: Stop Docker Compose services
        run: docker-compose down

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'  # only deploy on push, not PRs

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export DB_HOST=${{ secrets.RDS_HOST }}
            export DB_USER=${{ secrets.RDS_USER }}
            export DB_PASSWORD=${{ secrets.RDS_PASSWORD }}
            export DB_NAME=${{ secrets.RDS_DATABASE }}
            cd ~/Cascadia-Gear-Co-op
            git pull origin main
            docker compose -f docker-compose.prod.yml up -d --build